<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STORMFIRE – Login</title>
  <link rel="icon" href="/assets/img/logo.png" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <canvas id="astral"></canvas>

  <div class="page">
    <header>
      <div class="brand">
        <img src="/assets/img/logo.png" alt="STORMFIRE Logo" />
        <div class="title">
          <strong>STORMFIRE</strong>
          <span>Dev Logs • News • Patchnotes</span>
        </div>
      </div>

      <div class="headerRight">
        <nav>
          <a class="navbtn" href="/index.html">Home</a>
          <a class="navbtn" href="/news.html">News</a>
          <a class="navbtn" href="/gallery.html">Galerie</a>
          <a class="navbtn active" href="/login.html">Login</a>
          <a class="navbtn" href="/impressum.html">Impressum</a>
        </nav>

        <div class="liveStatus">
          <span class="dot warn" id="liveDot"></span>
          <span id="liveTxt">Lädt…</span>
        </div>
      </div>
    </header>

    <main>
      <div class="hero">
        <div>
          <h1>Login</h1>
          <p>Frontend-Konzept: später wird hier echtes Account-Login via API kommen.</p>
        </div>
        <div class="badge"><span class="dot warn"></span><span>Prototype</span></div>
      </div>

      <section class="grid">
        <article class="card" style="grid-column: span 12;">
          <div class="hd"><h2>Account</h2><span class="small">Demo</span></div>
          <div class="bd">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              <input class="input" id="user" placeholder="Username (Demo: Devaller)" />
              <input class="input" id="pass" type="password" placeholder="Passwort (Demo: egal)" />
              <button class="navbtn" id="btnLogin">Login</button>
              <button class="navbtn" id="btnLogout">Logout</button>
              <a class="navbtn" href="/account.html">Mein Account</a>
            </div>
            <div class="small" id="msg" style="margin-top:10px;">—</div>
          </div>
        </article>
      </section>
    </main>

    <footer>
      © <span id="year"></span> STORMFIRE • Rechte: Denis Toni Güven (Projekt in Entwicklung)
    </footer>
  </div>

  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/site.js"></script>
  <script src="/assets/js/auth.js"></script>
</body>
</html>

<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STORMFIRE – News</title>
  <link rel="icon" href="/assets/img/logo.png" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <canvas id="astral"></canvas>

  <div class="layout">
    <aside class="sidebar">
      <div class="brandBox">
        <img src="/assets/img/logo.png" alt="STORMFIRE Logo" />
        <div>
          <div class="t1">STORMFIRE</div>
          <div class="t2">News</div>
        </div>
      </div>

      <div class="sideSection">
        <div class="sideTitle">Navigation</div>
        <nav class="sideNav">
          <a class="navbtn" href="/index.html">Home</a>
          <a class="navbtn" href="/news.html">News</a>
          <a class="navbtn" href="/status.html">Realm Status</a>
          <a class="navbtn" href="/leaderboard.html">Leaderboard</a>
          <a class="navbtn" href="/roadmap.html">Roadmap</a>
          <a class="navbtn" href="/gallery.html">Galerie</a>
          <a class="navbtn" href="/team.html">Team</a>
          <a class="navbtn" href="/discord.html">Discord</a>
          <a class="navbtn" href="/download.html">Launcher</a>
          <a class="navbtn" href="/impressum.html">Impressum</a>
        </nav>
      </div>

      <div class="sideSection">
        <div class="sideTitle">Live</div>
        <div class="liveStatus">
          <span class="dot warn" id="liveDot"></span>
          <span id="liveTxt">Lädt…</span>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="hero">
        <div>
          <h1>News</h1>
          <p>Devlogs • Patchnotes • Updates</p>
        </div>
        <div class="badge">
          <span class="dot warn"></span>
          <span id="newsUpdated">Lädt…</span>
        </div>
      </div>

      <section class="grid">
        <article class="card" style="grid-column: span 12;">
          <div class="hd">
            <h2>Filter</h2>
            <span class="small" id="newsCount">0 Posts</span>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <input class="input" id="q" placeholder="Suchen (Titel, Text, Tags)..." />
            <select class="select" id="type">
              <option value="all">Alle Typen</option>
              <option value="devlog">Devlog</option>
              <option value="news">News</option>
              <option value="patch">Patch</option>
            </select>
            <button class="btn" id="reload" type="button">Neu laden</button>
          </div>
        </article>

        <article class="card" style="grid-column: span 12;">
          <div id="newsList" class="small">Lädt…</div>
        </article>
      </section>

      <footer>
        © <span id="year"></span> STORMFIRE • Rechte: Denis Toni Güven (Projekt in Entwicklung)
      </footer>
    </main>
  </div>

  <script src="/assets/js/astral.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/site.js"></script>
  <script src="/assets/js/news.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
